<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CryptClip Ultimate</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <img class="brand-logo" src="icon.png" alt="CryptClip Logo" width="20" height="20" style="border-radius: 4px; border: 1px solid var(--border-color);">
      <span class="brand-name">CryptClip</span>
    </div>
    <span class="badge">v2.0</span>
  </div>

  <!-- Add Secret Section -->
  <div class="card">
    <div class="form-group">
      <label for="label">Secret Name / Label</label>
      <input id="label" placeholder="e.g. Work Email Password" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="secret">Secret Value</label>
      <textarea id="secret" placeholder="Type or paste your sensitive text here..."></textarea>
    </div>
    <button id="saveBtn" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Save & Encrypt
    </button>
  </div>

  <!-- Saved Secrets Section -->
  <div class="section-title">Stored Secrets</div>
  <div id="items" class="items-list"></div>

  <!-- Custom Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="popup.js"></script>
</body>
</html>
